
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#AA151B">
    <title>ZayroLingua Academy | Spanish Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'spanish-red': '#AA151B',
              'spanish-gold': '#F1BF00',
              'spanish-dark': '#1a1a1a',
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'spin-slow': 'spin 12s linear infinite',
            }
          }
        }
      }
    </script>
    <style>
        body { 
          font-family: 'Inter', sans-serif; 
          background-color: #fdfcf6; 
          margin: 0; 
          overflow-x: hidden; 
          -webkit-tap-highlight-color: transparent;
        }
        .font-brand { font-family: 'Montserrat', sans-serif; }
        
        .bg-spanish-flag { background: linear-gradient(to bottom, #AA151B 25%, #F1BF00 25%, #F1BF00 75%, #AA151B 75%); }
        
        @keyframes rotate-sun { from { transform: rotate(0deg) scale(0.8); opacity: 0; } to { transform: rotate(360deg) scale(1); opacity: 1; } }
        @keyframes pulse-sun { 0%, 100% { filter: drop-shadow(0 0 5px #F1BF00); } 50% { filter: drop-shadow(0 0 20px #AA151B); } }
        @keyframes logo-in { 0% { letter-spacing: -0.2em; opacity: 0; transform: translateY(20px); } 100% { letter-spacing: normal; opacity: 1; transform: translateY(0); } }
        
        .animate-rotate-sun { animation: rotate-sun 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards; }
        .animate-pulse-sun { animation: pulse-sun 2s infinite ease-in-out; }
        .animate-logo { animation: logo-in 0.8s ease-out 0.5s both; }
        .splash-exit { transition: opacity 0.6s ease-in, transform 0.6s ease-in; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #AA151B40; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(170, 21, 27, 0.05);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @media print {
          .no-print { display: none !important; }
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.471.0",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
</body>
</html>
